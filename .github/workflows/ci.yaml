name: CI

on:
  push:

jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Show project files
        run: |
          pwd
          ls -la
          find .

      - name: Run Flake8
        run: |
          flake8 . --exit-zero